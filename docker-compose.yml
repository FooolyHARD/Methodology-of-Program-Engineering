services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pollosflow
      POSTGRES_USER: pollosflow
      POSTGRES_PASSWORD: pollosflow
    ports:
      - "5432:5432"
    volumes:
      - pollosflow-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pollosflow -d pollosflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"

volumes:
  pollosflow-postgres:

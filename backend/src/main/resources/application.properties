spring.application.name=pollosflow
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pollosflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pollosflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pollosflow}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/pollosflow/protocol/openid-connect/certs}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info,metrics

pollosflow.keycloak.enabled=${KEYCLOAK_ADMIN_SYNC_ENABLED:true}
pollosflow.keycloak.base-url=${KEYCLOAK_BASE_URL:http://localhost:8081}
pollosflow.keycloak.realm=${KEYCLOAK_REALM:pollosflow}
pollosflow.keycloak.admin-realm=${KEYCLOAK_ADMIN_REALM:master}
pollosflow.keycloak.admin-client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
pollosflow.keycloak.admin-username=${KEYCLOAK_ADMIN_USERNAME:admin}
pollosflow.keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:admin}

pollosflow.messaging.exchange=pollosflow.events
pollosflow.messaging.audit-queue=pollosflow.audit-events
pollosflow.messaging.audit-routing-key=pollosflow.audit.event

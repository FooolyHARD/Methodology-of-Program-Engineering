spring.application.name=pollosflow
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pollosflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pollosflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pollosflow}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info,metrics

pollosflow.security.demo-header=X-Demo-Role
